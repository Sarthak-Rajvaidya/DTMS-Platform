<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | DMTS Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 40px 20px;
        }
        .register-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 10px;
            padding: 12px;
        }
        .form-control:focus, .form-select:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #4f46e5;
            color: white;
            box-shadow: 0 0 0 0.25rem rgba(79, 70, 229, 0.25);
        }
        .btn-primary {
            background: #4f46e5;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background: #4338ca;
            transform: translateY(-2px);
        }
        .register-title {
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 30px;
        }
        .login-link {
            color: #818cf8;
            text-decoration: none;
            font-weight: 500;
        }
        .login-link:hover {
            color: #6366f1;
        }
        option {
            background: #1e293b;
            color: white;
        }
    </style>
</head>
<body>
    <div class="register-card text-center">
        <i class="bi bi-person-plus text-primary display-4 mb-3"></i>
        <h2 class="register-title">Create Account</h2>
        <form id="registerForm">
            <div class="row text-start">
                <div class="col-md-6 mb-3">
                    <label class="form-label small text-muted">USER ID</label>
                    <input type="text" id="user_id" class="form-control" placeholder="e.g. U001" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label small text-muted">FULL NAME</label>
                    <input type="text" id="name" class="form-control" placeholder="John Doe" required>
                </div>
            </div>
            <div class="row text-start">
                <div class="col-md-6 mb-3">
                    <label class="form-label small text-muted">AGE</label>
                    <input type="number" id="age" class="form-control" placeholder="20" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label small text-muted">ROLE</label>
                    <select id="role" class="form-select" required>
                        <option value="student">Student</option>
                        <option value="elderly">Elderly</option>
                    </select>
                </div>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label small text-muted">PASSWORD</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 mb-3">Register</button>
        </form>
        <p class="small text-muted mb-0">
            Already have an account? <a href="login.html" class="login-link">Sign In</a>
        </p>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            const userData = {
                user_id: document.getElementById('user_id').value,
                name: document.getElementById('name').value,
                age: parseInt(document.getElementById('age').value),
                role: document.getElementById('role').value,
                password: document.getElementById('password').value
            };
            
            const success = await register(userData);
            if (success) {
                alert('Registration successful! Please login.');
                window.location.href = 'login.html';
            } else {
                alert('Registration failed. User ID might already exist.');
            }
        };
    </script>
</body>
</html>
