<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | DMTS Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 10px;
            padding: 12px;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #4f46e5;
            color: white;
            box-shadow: 0 0 0 0.25rem rgba(79, 70, 229, 0.25);
        }
        .btn-primary {
            background: #4f46e5;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background: #4338ca;
            transform: translateY(-2px);
        }
        .login-title {
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 30px;
        }
        .register-link {
            color: #818cf8;
            text-decoration: none;
            font-weight: 500;
        }
        .register-link:hover {
            color: #6366f1;
        }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <i class="bi bi-shield-check text-primary display-4 mb-3"></i>
        <h2 class="login-title">Welcome Back</h2>
        <form id="loginForm">
            <div class="mb-3 text-start">
                <label class="form-label small text-muted">USER ID</label>
                <input type="text" id="user_id" class="form-control" placeholder="e.g. U001" required>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label small text-muted">PASSWORD</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 mb-3">Sign In</button>
        </form>
        <p class="small text-muted mb-0">
            Don't have an account? <a href="register.html" class="register-link">Register now</a>
        </p>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const user_id = document.getElementById('user_id').value;
            const password = document.getElementById('password').value;
            
            const success = await login(user_id, password);
            if (success) {
                window.location.href = 'index.html';
            } else {
                alert('Invalid credentials');
            }
        };
    </script>
</body>
</html>
